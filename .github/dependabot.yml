# Automated dependency + security update PRs.
# Rationale: the inherited fork ships many transitive npm vulnerabilities;
# keeping deps current is this project's primary security control.
version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/vole-core"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "npm"
    directory: "/vole-app"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore(deps)"
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "chore(ci)"
